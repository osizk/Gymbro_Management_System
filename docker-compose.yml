services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: gymbro_admin
      POSTGRES_PASSWORD: 1111
      POSTGRES_DB: gymbro_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # This maps your local init SQL scripts to run automatically on first startup
      - ./database:/docker-entrypoint-initdb.d 
  adminer:
    image: adminer
    ports:
      - "8081:8080"
    depends_on:
      - db

  backend:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_USER=gymbro_admin
      - DB_PASSWORD=1111
      - DB_NAME=gymbro_db
      - PORT=5000
    depends_on:
      - db
    volumes:
      - ./server:/app
      - /app/node_modules

  frontend:
    build: ./client
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    volumes:
      - ./client:/app
      - /app/node_modules

volumes:
  pgdata: